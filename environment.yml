name: cellpose_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pytorch
  - torchvision
  - pytorch-cuda=11.8        # Switch to 12.1 if you have an RTX 40-series/Ada GPU
  - opencv
  - shapely
  - numpy>=1.26.0            # Fully compatible with Python 3.12
  - notebook                 # Jupyter Notebook environment
  - ipykernel                # Allows notebook to hook into this specific environment
  - pip:
    - cellpose==3.1.0        # Forces stable Cellpose 3
    - roifile
    